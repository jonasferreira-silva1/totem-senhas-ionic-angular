<ion-header class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-title class="kiosk-title">
      <ion-icon name="ticket-outline" class="title-icon"></ion-icon>
      TOTEM DE SENHAS
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="kiosk-content">
  <div class="kiosk-container">
    <div class="kiosk-header">
      <h1>Bem-vindo(a)</h1>
      <p>Por favor, toque em uma das opções abaixo para retirar sua senha</p>
    </div>

    <!-- Exibição de Senha Gerada -->
    <div class="ticket-display-container animate-fade-in" *ngIf="senhasService.inputNovaSenha">
      <div class="ticket-card animate-pop-in">
        <div class="ticket-decoration"></div>
        <span class="ticket-label">SUA SENHA</span>
        <h2 class="ticket-number">{{ senhasService.inputNovaSenha }}</h2>
        <div class="ticket-divider"></div>
        <div class="ticket-footer">
          <ion-icon name="print-outline"></ion-icon>
          <span>Retire sua via impressa abaixo</span>
        </div>
      </div>
    </div>

    <!-- Botões em formato Grid/Cards -->
    <div class="kiosk-grid">
      <button class="kiosk-card card-geral" (click)="senhasService.novaSenha('SG')">
        <div class="card-inner">
          <div class="icon-wrapper">
            <ion-icon name="people-outline"></ion-icon>
          </div>
          <div class="card-info">
            <h3>Senha Geral</h3>
            <p>Atendimento padrão e serviços comuns</p>
          </div>
        </div>
        <div class="arrow-indicator">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>
      </button>

      <button class="kiosk-card card-prioritario" (click)="senhasService.novaSenha('SP')">
        <div class="card-inner">
          <div class="icon-wrapper">
            <ion-icon name="accessibility-outline"></ion-icon>
          </div>
          <div class="card-info">
            <h3>Prioritário</h3>
            <p>Idosos, gestantes e pessoas com deficiência</p>
          </div>
        </div>
        <div class="arrow-indicator">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>
      </button>

      <button class="kiosk-card card-exame" (click)="senhasService.novaSenha('SE')">
        <div class="card-inner">
          <div class="icon-wrapper">
            <ion-icon name="flask-outline"></ion-icon>
          </div>
          <div class="card-info">
            <h3>Exames</h3>
            <p>Realização de exames e procedimentos</p>
          </div>
        </div>
        <div class="arrow-indicator">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>
      </button>
    </div>
  </div>
</ion-content>
